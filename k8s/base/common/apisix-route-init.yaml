---
# ConfigMap holding the route configuration script
apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-route-config
data:
  configure.sh: |
    #!/bin/sh
    set -e

    ADMIN_URL="http://apisix.common.svc.cluster.local:9180/apisix/admin"
    # ADMIN_KEY is injected from Secret via env var

    echo "Waiting for APISIX Admin API..."
    until curl -s -o /dev/null -H "X-API-KEY: $ADMIN_KEY" "$ADMIN_URL/routes"; do
      echo "  not ready, retrying in 3s..."
      sleep 3
    done
    echo "APISIX Admin API is ready!"

    # ─── Upstreams ───────────────────────────────────────────────
    echo ""
    echo "Creating upstream 1: product-service (product-svc.app:80)..."
    curl -s -X PUT "$ADMIN_URL/upstreams/1" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "roundrobin",
        "nodes": { "product-svc.app.svc.cluster.local:80": 1 }
      }'

    echo ""
    echo "Creating upstream 2: order-service (order-svc.app:80)..."
    curl -s -X PUT "$ADMIN_URL/upstreams/2" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "roundrobin",
        "nodes": { "order-svc.app.svc.cluster.local:80": 1 }
      }'

    echo ""
    echo "Creating upstream 3: storefront (storefront-svc.app:80)..."
    curl -s -X PUT "$ADMIN_URL/upstreams/3" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "roundrobin",
        "nodes": { "storefront-svc.app.svc.cluster.local:80": 1 }
      }'

    echo ""
    echo "Creating upstream 4: admin (admin-svc.app:80)..."
    curl -s -X PUT "$ADMIN_URL/upstreams/4" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "roundrobin",
        "nodes": { "admin-svc.app.svc.cluster.local:80": 1 }
      }'

    # ─── Routes ──────────────────────────────────────────────────

    # --- Storefront ---
    echo ""
    echo "Route 1: /services/testing-apisix/storefront/api/v1/products* -> product-svc"
    curl -s -X PUT "$ADMIN_URL/routes/1" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "storefront-products-api",
        "uri": "/services/testing-apisix/storefront/api/v1/products*",
        "upstream_id": "1",
        "priority": 20,
        "plugins": {
          "proxy-rewrite": {
            "regex_uri": ["^/services/testing-apisix/storefront(/api/.*)", "$1"]
          }
        }
      }'

    echo ""
    echo "Route 2: /services/testing-apisix/storefront/api/v1/orders* -> order-svc"
    curl -s -X PUT "$ADMIN_URL/routes/2" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "storefront-orders-api",
        "uri": "/services/testing-apisix/storefront/api/v1/orders*",
        "upstream_id": "2",
        "priority": 20,
        "plugins": {
          "proxy-rewrite": {
            "regex_uri": ["^/services/testing-apisix/storefront(/api/.*)", "$1"]
          }
        }
      }'

    echo ""
    echo "Route 3: /services/testing-apisix/storefront/* -> storefront-svc (catch-all)"
    curl -s -X PUT "$ADMIN_URL/routes/3" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "storefront-catch-all",
        "uri": "/services/testing-apisix/storefront/*",
        "upstream_id": "3",
        "priority": 1,
        "plugins": {}
      }'

    # --- Admin ---
    echo ""
    echo "Route 4: /services/testing-apisix/admin/api/v1/products* -> product-svc"
    curl -s -X PUT "$ADMIN_URL/routes/4" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "admin-products-api",
        "uri": "/services/testing-apisix/admin/api/v1/products*",
        "upstream_id": "1",
        "priority": 20,
        "plugins": {
          "proxy-rewrite": {
            "regex_uri": ["^/services/testing-apisix/admin(/api/.*)", "$1"]
          }
        }
      }'

    echo ""
    echo "Route 5: /services/testing-apisix/admin/api/v1/orders* -> order-svc"
    curl -s -X PUT "$ADMIN_URL/routes/5" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "admin-orders-api",
        "uri": "/services/testing-apisix/admin/api/v1/orders*",
        "upstream_id": "2",
        "priority": 20,
        "plugins": {
          "proxy-rewrite": {
            "regex_uri": ["^/services/testing-apisix/admin(/api/.*)", "$1"]
          }
        }
      }'

    echo ""
    echo "Route 6: /services/testing-apisix/admin/* -> admin-svc (catch-all)"
    curl -s -X PUT "$ADMIN_URL/routes/6" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "admin-catch-all",
        "uri": "/services/testing-apisix/admin/*",
        "upstream_id": "4",
        "priority": 1,
        "plugins": {}
      }'

    echo ""
    echo "Routes configured successfully!"
    echo ""
    echo "Route summary:"
    echo "  /services/testing-apisix/storefront/api/v1/products* -> product-svc:80  (priority 20)"
    echo "  /services/testing-apisix/storefront/api/v1/orders*   -> order-svc:80    (priority 20)"
    echo "  /services/testing-apisix/storefront/*                 -> storefront:80   (priority 1)"
    echo "  /services/testing-apisix/admin/api/v1/products*       -> product-svc:80  (priority 20)"
    echo "  /services/testing-apisix/admin/api/v1/orders*         -> order-svc:80    (priority 20)"
    echo "  /services/testing-apisix/admin/*                      -> admin:80        (priority 1)"
---
# Job that runs once to seed APISIX routes
apiVersion: batch/v1
kind: Job
metadata:
  name: apisix-route-init
  labels:
    app: apisix-route-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: apisix-route-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure
          image: curlimages/curl:8.6.0
          command: ["sh", "/scripts/configure.sh"]
          env:
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: apisix-admin-secret
                  key: admin-key
          volumeMounts:
            - name: config
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: apisix-route-config
            defaultMode: 0755