---
# ConfigMap holding the route configuration script
apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-route-config
data:
  configure.sh: |
    #!/bin/sh
    set -e

    ADMIN_URL="http://apisix.common.svc.cluster.local:9180/apisix/admin"
    # ADMIN_KEY is injected from Secret via env var

    echo "Waiting for APISIX Admin API..."
    until curl -s -o /dev/null -H "X-API-KEY: $ADMIN_KEY" "$ADMIN_URL/routes"; do
      echo "  not ready, retrying in 3s..."
      sleep 3
    done
    echo "APISIX Admin API is ready!"

    echo ""
    echo "Creating upstream: backend (backend-svc.app:3001)..."
    curl -s -X PUT "$ADMIN_URL/upstreams/1" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "roundrobin",
        "nodes": { "backend-svc.app.svc.cluster.local:3001": 1 }
      }'

    echo ""
    echo "Creating upstream: frontend (frontend-svc.app:3000)..."
    curl -s -X PUT "$ADMIN_URL/upstreams/2" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "roundrobin",
        "nodes": { "frontend-svc.app.svc.cluster.local:3000": 1 }
      }'

    echo ""
    echo "Creating route: /api/* -> backend..."
    curl -s -X PUT "$ADMIN_URL/routes/1" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "backend-api",
        "uri": "/api/*",
        "upstream_id": "1",
        "priority": 10
      }'

    echo ""
    echo "Creating route: /* -> frontend..."
    curl -s -X PUT "$ADMIN_URL/routes/2" \
      -H "X-API-KEY: $ADMIN_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "frontend-catch-all",
        "uri": "/*",
        "upstream_id": "2",
        "priority": 1
      }'

    echo ""
    echo "Routes configured successfully!"
---
# Job that runs once to seed APISIX routes
apiVersion: batch/v1
kind: Job
metadata:
  name: apisix-route-init
  labels:
    app: apisix-route-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: apisix-route-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure
          # Switched from busybox to curlimages/curl
          image: curlimages/curl:8.6.0
          command: ["sh", "/scripts/configure.sh"]
          env:
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: apisix-admin-secret
                  key: admin-key
          volumeMounts:
            - name: config
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: apisix-route-config
            defaultMode: 0755