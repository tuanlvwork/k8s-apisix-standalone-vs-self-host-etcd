apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: common

resources:
  - etcd.yaml
  - apisix.yaml
  - apisix-route-init.yaml
  - dashboard.yaml

# ---------- Secrets ----------
secretGenerator:
  - name: apisix-admin-secret
    literals:
      - admin-key=apisix-sandbox-admin-key
    options:
      disableNameSuffixHash: true

labels:
  - pairs:
      part-of: apisix-sandbox
      layer: infrastructure
