---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: sandbox-admin:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /services/admin
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /services/admin
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: admin-svc
  labels:
    app: admin
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3003
  selector:
    app: admin
